<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Murderball</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      body {
        touch-action: none; -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none; /* no press-and-hold callout on iOS */
      }
      #app { position: fixed; inset: 0; touch-action: none; }
      canvas {
        display: block; width: 100%; height: 100%;
        touch-action: none; -webkit-touch-callout: none;
      }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font: 700 16px/1.25 ui-monospace, "SF Mono", Menlo, monospace;
        color: #ffcc33; text-transform: uppercase; letter-spacing: 2px;
        text-shadow: 2px 2px 0 #000;
      }
      #score {
        position: absolute; top: env(safe-area-inset-top, 10px); left: 0; right: 0;
        text-align: center; white-space: pre; font-size: 20px;
      }
      /* Persistent readout under the score: live multipliers + murderball. */
      #tags {
        position: absolute; top: calc(env(safe-area-inset-top, 10px) + 28px); left: 0; right: 0;
        display: flex; justify-content: center; gap: 16px; font-size: 13px;
      }
      #tagMe { color: #2ad4ff; }
      #tagThem { color: #ff3ecb; }
      /* Big translucent neon punch-in when a multiplier or murderball changes.
         Driven by a one-shot CSS animation (compositor-friendly) rather than
         per-frame JS, and a cheap fixed-size glow — a vmin-scaled multi-layer
         blur repainted each frame tanked desktop frame rates. */
      #flash {
        position: absolute; inset: 0; display: flex;
        align-items: center; justify-content: center;
        font-size: 20vmin; letter-spacing: 6px; opacity: 0;
        will-change: opacity, transform;
        text-shadow: 0 2px 0 #000, 0 0 14px currentColor;
      }
      #flash.play { animation: flashpop 1.1s ease-out forwards; }
      @keyframes flashpop {
        0%   { opacity: 0;    transform: scale(1.35); }
        12%  { opacity: 0.55; transform: scale(1); }
        55%  { opacity: 0.55; transform: scale(1); }
        100% { opacity: 0;    transform: scale(1.25); }
      }
      #banner {
        position: absolute; inset: 0; display: none;
        align-items: center; justify-content: center; text-align: center;
        font-size: 34px; line-height: 1.5; color: #ffcc33; text-shadow: 3px 3px 0 #000;
        white-space: pre-line;
      }
      #banner.win { color: #7dffb0; }
      #banner.lose { color: #ff5b5b; }
      #banner.draw { color: #cbd6e4; }
      #debug {
        position: absolute; bottom: env(safe-area-inset-bottom, 8px); left: 10px;
        font-size: 11px; opacity: 0.6; letter-spacing: 1px;
      }
      #mute, #restart {
        position: absolute; top: env(safe-area-inset-top, 10px);
        pointer-events: auto; width: 40px; height: 40px;
        background: rgba(20,26,34,0.6); border: 1px solid #40506a; border-radius: 8px;
        font-size: 20px; line-height: 1; color: #ffcc33; cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #mute { right: 10px; }
      #restart { right: 58px; }
      /* Start / play-again overlay: difficulty picker over the wide opening shot. */
      #start {
        position: absolute; inset: 0; display: none; pointer-events: auto;
        flex-direction: column; align-items: center; justify-content: center; gap: 26px;
        background: rgba(10,14,20,0.82); text-align: center; padding: 24px;
      }
      #start.show { display: flex; }
      #headline {
        font-size: 30px; line-height: 1.45; color: #ffcc33; letter-spacing: 4px;
        text-shadow: 3px 3px 0 #000; white-space: pre-line;
      }
      #headline.win { color: #7dffb0; }
      #headline.lose { color: #ff5b5b; }
      #headline.draw { color: #cbd6e4; }
      #levels { display: flex; gap: 10px; }
      #levels button {
        font: inherit; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
        padding: 10px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent;
        background: rgba(20,26,34,0.8); border: 2px solid #40506a; border-radius: 8px;
        color: #8ea4bd;
      }
      #levels button.on { border-color: #2ad4ff; color: #2ad4ff; }
      #go {
        font: inherit; font-size: 22px; letter-spacing: 4px; text-transform: uppercase;
        padding: 14px 34px; cursor: pointer; -webkit-tap-highlight-color: transparent;
        background: #ffcc33; border: none; border-radius: 10px; color: #141b25;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="score"></div>
      <div id="tags">
        <span id="tagMe"></span><span id="tagMB"></span><span id="tagThem"></span>
      </div>
      <div id="flash"></div>
      <div id="banner"></div>
      <div id="debug"></div>
      <button id="restart" aria-label="Restart match">↺</button>
      <button id="mute" aria-label="Toggle sound">🔊</button>
      <div id="start">
        <div id="headline">MURDERBALL</div>
        <div id="levels">
          <button data-level="easy">Easy</button>
          <button data-level="normal" class="on">Normal</button>
          <button data-level="hard">Hard</button>
        </div>
        <button id="go">Start</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
