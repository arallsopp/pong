<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Murderball</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      body { touch-action: none; -webkit-user-select: none; user-select: none; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font: 700 16px/1.25 ui-monospace, "SF Mono", Menlo, monospace;
        color: #ffcc33; text-transform: uppercase; letter-spacing: 2px;
        text-shadow: 2px 2px 0 #000;
      }
      #score {
        position: absolute; top: env(safe-area-inset-top, 10px); left: 0; right: 0;
        text-align: center; white-space: pre; font-size: 20px;
      }
      #banner {
        position: absolute; inset: 0; display: none;
        align-items: center; justify-content: center; text-align: center;
        font-size: 34px; line-height: 1.5; color: #ffcc33; text-shadow: 3px 3px 0 #000;
        white-space: pre-line;
      }
      #banner.win { color: #7dffb0; }
      #banner.lose { color: #ff5b5b; }
      #banner.draw { color: #cbd6e4; }
      #debug {
        position: absolute; bottom: env(safe-area-inset-bottom, 8px); left: 10px;
        font-size: 11px; opacity: 0.6; letter-spacing: 1px;
      }
      #mute {
        position: absolute; top: env(safe-area-inset-top, 10px); right: 10px;
        pointer-events: auto; width: 40px; height: 40px;
        background: rgba(20,26,34,0.6); border: 1px solid #40506a; border-radius: 8px;
        font-size: 20px; line-height: 1; color: #ffcc33; cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="score"></div>
      <div id="banner"></div>
      <div id="debug"></div>
      <button id="mute" aria-label="Toggle sound">🔊</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
